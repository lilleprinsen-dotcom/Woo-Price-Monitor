services:
  browser-worker:
    build:
      context: ./browser-worker
    restart: unless-stopped
    environment:
      PORT: "8787"
      LPM_WORKER_SECRET: "${LPM_WORKER_SECRET}"
      LPM_ALLOWED_MAX_BODY_BYTES: "65536"
      LPM_SIGNATURE_TOLERANCE_SECONDS: "300"
      LPM_MAX_CONCURRENT_RENDERS: "2"
    expose:
      - "8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - browser-worker
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
